<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curtai.online</title>
    <meta name="description" content="Transforme sua presença no TikTok em uma máquina de vendas com estratégias de conteúdo e afiliação de alto impacto." />
    <link rel="icon" type="image/png" href="https://curtai.online/iconetiktokshop.png" />
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens in some environments where window.fetch is read-only.
      (function() {
        try {
          if (typeof window !== 'undefined' && window.fetch) {
            const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
            if (descriptor && !descriptor.writable && !descriptor.set && descriptor.configurable) {
              const originalFetch = window.fetch;
              Object.defineProperty(window, 'fetch', {
                get: () => originalFetch,
                set: (v) => { console.warn('Something tried to overwrite window.fetch', v); },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {
          console.error('Failed to apply fetch fix:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
