<!doctype html>
<html lang="en">
  <head>
    <script>
      // Aggressive fix for "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          const target = window;
          const prop = 'fetch';
          
          // Try to define a setter that does nothing to prevent the error
          // if some library tries to assign to it.
          const descriptor = Object.getOwnPropertyDescriptor(target, prop) || 
                             Object.getOwnPropertyDescriptor(Object.getPrototypeOf(target), prop);
          
          if (descriptor && !descriptor.set && (descriptor.configurable || !descriptor.writable)) {
            const originalFetch = target[prop];
            try {
              Object.defineProperty(target, prop, {
                get: function() { return originalFetch; },
                set: function(v) { console.warn('Blocked attempt to overwrite window.fetch'); },
                configurable: true,
                enumerable: true
              });
            } catch (e) {
              // If we can't define it on window, try to just ignore the error in the environment
              // by overriding the assignment behavior if possible (hard in JS)
              console.error('Could not redefine fetch descriptor:', e);
            }
          }
        } catch (e) {
          // Ignore
        }
      })();
    </script>
